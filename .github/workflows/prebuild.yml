name: Prebuild

on:
  workflow_dispatch:
  release:
    types:
      - published

jobs:
  prebuild:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            label: linux-x64
          - runner: ubuntu-24.04-arm
            label: linux-arm64
          - runner: macos-latest
            label: macos-x64
          - runner: macos-14
            label: macos-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.22.1
          cache: npm

      - run: npm install
      - run: npm run build
      - run: npm run prebuild

      - uses: actions/upload-artifact@v4
        with:
          name: prebuild-${{ matrix.label }}
          path: prebuilds/

