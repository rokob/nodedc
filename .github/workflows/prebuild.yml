name: Prebuild

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prebuild:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            label: linux-x64
          - runner: ubuntu-22.04-arm
            label: linux-arm64
          - runner: macos-14
            label: macos-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 22.22.1
          cache: npm

      - run: npm ci
      - run: npm run build:js
      - run: npm run build:prebuilts
      - run: npm run verify:prebuilts

      - uses: actions/upload-artifact@v7
        with:
          name: prebuild-${{ matrix.label }}
          path: prebuilds/

  bundle:
    needs: prebuild
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: prebuild-*
          path: prebuilds
          merge-multiple: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22.22.1

      - run: node ./scripts/verify-prebuilds.mjs

      - run: tar -czf nodedc-prebuilds-${{ github.event.release.tag_name || github.sha }}.tar.gz prebuilds

      - uses: actions/upload-artifact@v7
        with:
          name: prebuilds-bundle
          path: nodedc-prebuilds-${{ github.event.release.tag_name || github.sha }}.tar.gz

      - if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ github.event.release.tag_name }} nodedc-prebuilds-${{ github.event.release.tag_name }}.tar.gz --clobber
